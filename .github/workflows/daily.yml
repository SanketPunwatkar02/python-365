name: Publish Daily Python Lesson

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Generate lesson templates
        run: python -m scripts.generate_lessons

      - name: Publish today's lesson
        run: python -m scripts.publish

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          DAY=$(python -c "import json; d=json.load(open('progress.json')); print(f'{d[\"current_day\"]:03d}')")
          TOPIC=$(python -c "import json; d=json.load(open('progress.json')); print(d['current_topic'])")

          git commit -m "feat: publish Day ${DAY} - ${TOPIC} [skip ci]"
          git push
