name: Publish Daily Python Lesson

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: python-365-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Validate Python scripts
        run: |
          python -m py_compile scripts/*.py

      - name: Publish today's lesson
        run: |
          python -m scripts.publish

      - name: Commit and push changes
        run: |
          git config user.name "sanketpunwatkar02"
          git config user.email "sanketpunwatkar02@gmail.com"

          git add README.md progress.json published/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          DAY=$(python -c "import json;print(f'{json.load(open(\"progress.json\"))[\"current_day\"]:03d}')")
          TOPIC=$(python -c "import json;print(json.load(open(\"progress.json\"))[\"current_topic\"])")

          git commit -m "feat: publish Day ${DAY} - ${TOPIC}"
          git push